  const neg = n < 0, a = Math.abs(n);

  if (a >= 1e6) s = "$" + (a / 1e6).toFixed(2) + "M";
  else if (a >= 1e3) s = "$" + Math.round(a / 1e3) + "K";
  else s = "$" + Math.round(a);
  return neg ? "−" + s : s;
};

};

/* ============ ANIMATION HOOKS ============ */
function useAnimatedNumber(target, duration = 700) {
  const [display, setDisplay] = useState(target);
  const rafRef = useRef();
  const fromRef = useRef(target);
  useEffect(() => {
    const from = fromRef.current;
    const start = performance.now();
    cancelAnimationFrame(rafRef.current);
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(from + (target - from) * eased);
      if (t < 1) rafRef.current = requestAnimationFrame(tick);
      else fromRef.current = target;
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [target, duration]);
  return display;
}

];

let dealSeq = 0;
const genDeal = (marketRate) => {
  const t = DEAL_TYPES[Math.floor(Math.random() * DEAL_TYPES.length)];
  const roundTo = t.priceRange[1] > 5000000 ? 50000 : t.priceRange[1] > 1500000 ? 25000 : 5000;
  const price = Math.round(randRange(t.priceRange[0], t.priceRange[1]) / roundTo) * roundTo;
  const tierIdx = weightedTier();
  const tier = CREDIT_TIERS[tierIdx];
  const expectedCap = 0.058 + tier.capAdj;
  const cap = Math.max(0.045, expectedCap + (Math.random() - 0.35) * 0.024);
  const hot = cap > expectedCap + 0.009;
  const noiAnnual = price * cap;
  const sqft = Math.round(randInt(t.sqftRange[0], t.sqftRange[1]) / 100) * 100;
  const leaseYearsLeft = randInt(Math.max(1, Math.floor(tier.leaseTermYears[0] / 2)), tier.leaseTermYears[1]);

  const leaseTypeIdx = weighted(t.leaseWeights);
  const lease = LEASE_TYPES[leaseTypeIdx];
  const taxRate = randRange(0.018, 0.024);
  const insRate = randRange(t.insRange[0], t.insRange[1]);
  const camRate = randRange(0.002, 0.004);
  const taxAnnual = price * taxRate;
  const insAnnual = price * insRate;
  const camAnnual = price * camRate;
  const landlordOpexAnnual = taxAnnual * (1 - lease.taxPass) + insAnnual * (1 - lease.insPass) + camAnnual * (1 - lease.camPass);
  const grossRentAnnual = noiAnnual + landlordOpexAnnual; // back-solved so marketed cap = NOI/price
  const grossRentMo = grossRentAnnual / 12;
  const landlordOpexMo = landlordOpexAnnual / 12;
  const noiMo = grossRentMo - landlordOpexMo;

  const rate = Math.max(0.03, marketRate + lease.rateAdj + t.typeRateAdj);
  const ltv = Math.min(0.75, Math.max(0.55, 0.70 + lease.ltvAdj));

  return {
    id: "deal" + ++dealSeq, ...t, price, cap, noiMo, rate, sqft, ltv,
    tenantName: genTenantName(tierIdx), tierIdx, leaseYearsLeft,
    leaseTypeIdx, taxAnnual, insAnnual, camAnnual, landlordOpexMo, grossRentMo,
    hot, ttl: hot ? randInt(1, 3) : randInt(4, 10),
  };
};

/* ============ SHARED FINANCIAL LOGIC (used identically for tick + display, all properties) ============ */
function incomeOpexFor(p, m) {
  if (p.isMac) {
    const r711 = m < 98 ? 12000 : m < 158 ? 13200 : 14520;
    let income = r711, opex = 1167 * Math.pow(1.03, m / 12);
    if (p.kabobs.status === "occupied") income += p.kabobs.rent;
    else opex += 850;
    return { income, opex };
  }
  const yrs = Math.max(0, (m - p.boughtMonth) / 12);
  if (p.status === "occupied") {
    return { income: p.grossRentBase * Math.pow(1.02, yrs), opex: p.landlordOpexBase * Math.pow(1.03, yrs) };
  }
  return { income: 0, opex: p.landlordOpexBase * Math.pow(1.03, yrs) + 250 * (p.sqft / 2000) };
}

    setG((prev) => {

      const logs = [];
      const addLog = (t, k = "info") => logs.push({ m: s.month, t, k });
      const unlock = (key) => { if (!s.ach.includes(key)) { s.ach.push(key); logs.push({ m: s.month, t: ACH_DEFS[key], k: "ach" }); } };
      const alert = (title, body) => s.queue.push({ kind: "alert", title, body });

      for (let i = 0; i < n; i++) {
        if (s.queue.length) break;
        s.month += 1;
        const m = s.month;

        if (s.reserve > 0) s.reserve *= 1 + s.treasury / 12;

        if (m % 12 === 0) s.treasuryMean = Math.min(0.06, Math.max(0.025, s.treasuryMean + (Math.random() - 0.5) * 0.006));
        const reversion = (s.treasuryMean - s.treasury) * 0.045;
        const noise = gauss() * 0.0016;
        let shock = 0;
        if (Math.random() < 0.035) {
          shock = (Math.random() < 0.5 ? -1 : 1) * (0.001 + Math.random() * 0.0016);
          addLog(shock > 0 ? "Fed commentary spooks the bond market — yields tick up sharply." : "Cooler inflation print — yields ease sharply.", "warn");
        }
        s.treasury = Math.min(0.08, Math.max(0.015, s.treasury + reversion + noise + shock));

        if (s.escrow && m > s.escrow.deadline) {
          const tax = 0.25 * Math.max(0, s.escrow.gain);
          s.cash += s.escrow.amount - tax;
          addLog(`1031 window expired. Escrow released ${fmt(s.escrow.amount)} minus ${fmt(tax)} capital gains tax.`, "bad");
          s.escrow = null;
        }

        for (const p of s.properties) {
          /* ---- lifecycle / status transitions (mutate first) ---- */
          if (p.isMac) {
            if (m === 98) addLog("7-Eleven rent stepped up to $13,200/mo per lease.", "good");
            if (m === 158) addLog("7-Eleven rent stepped up to $14,520/mo per lease.", "good");
            const kb = p.kabobs;
            if (kb.status === "dark" && m >= kb.darkUntil) {
              kb.status = "occupied"; kb.rent = 4900; s.cash -= 25000;
              addLog("New tenant signed for the 544sf suite at $4,900/mo. TI/leasing cost: $25K.", "good");
              unlock("vacancy");
            }
            if (m === 90 && kb.status === "occupied" && !kb.secured) {
              s.queue.push({
                kind: "decision", title: "Kabobs To Go — early renewal window",
                body: "Rahimi's lease expires Jul 2037 with no option. Offer a $15K TI package now to lock a 10-year extension at $4,800/mo?",
                options: [
                  { label: "Pay $15K — lock the renewal", id: "kabobs-secure" },
                  { label: "Pass — take our chances in 2037", id: "kabobs-pass" },
                ],
              });
              addLog("Decision needed: Kabobs early-renewal window is open.", "warn");
            }
            if (m === 131 && kb.status === "occupied") {
              if (kb.secured) { kb.rent = 4800; addLog("Kabobs renewed on the locked extension — $4,800/mo for 10 more years.", "good"); }
              else if (Math.random() < 0.55) addLog("Kabobs To Go renewed flat at expiry. Dodged one.", "good");
              else {
                kb.status = "dark"; kb.darkUntil = m + randInt(6, 18);
                alert("🏚️ Kabobs To Go went dark", `The 544sf suite did not renew at expiry (Jul 2037). Rent stops immediately; you're still carrying utilities/CAM until re-leased around ${dateLabel(m + randInt(6,18))}.`);
                addLog("Kabobs To Go went dark at lease expiry. Suite vacant.", "bad");
              }
            }
            if (m === 216) {
              if (Math.random() < 0.85) addLog("7-Eleven franchisee renewed at expiry (+10% rent).", "good");
              else addLog("7-Eleven franchisee did not renew?! (Simplified: corporate re-let, rent continues.)", "warn");
            }
            if (p.loan.resets.includes(m) && p.loan.balance > 0) {
              const newRate = Math.max(p.loan.floor, s.treasury + 0.0287);
              const elapsed = m - p.loan.originMonth;
              const remYears = Math.max(1, (p.loan.amortYears * 12 - elapsed) / 12);
              const oldPmt = p.loan.payment;
              p.loan.rate = newRate;
              p.loan.payment = pmtCalc(p.loan.balance, newRate, remYears);
              addLog(`RATE RESET (${p.loan.lender}): ${(newRate * 100).toFixed(2)}% — payment re-amortized ${fmt(oldPmt)} → ${fmt(p.loan.payment)}/mo on ${fmt(p.loan.balance)} balance.`, newRate > 0.0676 ? "warn" : "good");
            }
          } else {
            const tier = CREDIT_TIERS[p.tierIdx];
            if (p.status === "occupied") {
              p.leaseMonthsLeft -= 1;
              let vacated = false;
              if (p.leaseMonthsLeft <= 0) {
                if (Math.random() > tier.renewalProb) vacated = true;
                else { p.leaseMonthsLeft = randInt(tier.leaseTermYears[0], tier.leaseTermYears[1]) * 12; p.grossRentBase *= 1.02; addLog(`${p.tenantName} renewed at ${p.name} — locked in for another ${Math.round(p.leaseMonthsLeft/12)} years.`, "good"); }
              } else if (Math.random() < tier.defaultRiskMo) vacated = true;
              if (vacated) {
                p.status = "dark"; p.darkUntil = m + randInt(tier.downMonths[0], tier.downMonths[1]);
                alert(`🏚️ Tenant vacated — ${p.name}`, `${p.tenantName} (${tier.tier}) is out. NOI stops now; carrying costs continue until re-leased around ${dateLabel(p.darkUntil)}. Tenant credit strength predicted this risk.`);
                addLog(`${p.tenantName} vacated ${p.name} — suite dark.`, "bad");
              }
            } else if (p.status === "dark" && m >= p.darkUntil) {
              const newTierIdx = weighted(TIER_TRANSITION_WEIGHTS[p.tierIdx]);
              const newTier = CREDIT_TIERS[newTierIdx];
              const tiCost = randInt(newTier.tiCost[0], newTier.tiCost[1]) * p.sqft;
              s.cash -= tiCost;
              p.status = "occupied"; p.tierIdx = newTierIdx; p.tenantName = genTenantName(newTierIdx); p.leaseMonthsLeft = randInt(newTier.leaseTermYears[0], newTier.leaseTermYears[1]) * 12;
              if (tiCost >= LARGE_EXPENSE) alert(`🔨 Re-leased — ${p.name}`, `${p.tenantName} (${newTier.tier}) signed. Tenant-improvement / leasing cost: ${fmtFull(tiCost)}, deducted now.`);
              else addLog(`${p.tenantName} (${newTier.tier}) signed at ${p.name}. TI cost ${fmt(tiCost)}.`, "good");
              unlock("vacancy");
            }
          }

          /* ---- financials: income, opex, debt service (unified for all properties) ---- */
          const { income, opex } = incomeOpexFor(p, m);
          let ds = 0;
          if (p.loan.balance > 0) {
            const int = (p.loan.balance * p.loan.rate) / 12;
            const prin = Math.min(p.loan.payment - int, p.loan.balance);
            ds = int + Math.max(0, prin);
            p.loan.balance = Math.max(0, p.loan.balance - Math.max(0, prin));
            if (p.loan.balance === 0) { addLog(`${p.name} is FREE & CLEAR. ${fmt(p.loan.payment)}/mo debt service ends.`, "good"); unlock("freeclear"); }
          }
          p.value *= 1 + (0.02 + (Math.random() - 0.5) * 0.01) / 12;
          s.cash += income - opex - ds;

          /* ---- unified expense-event engine: scales with value, property risk, and lease exposure ---- */
          const roll = Math.random();
          if (roll < 0.09) {
            const [txt, lo, hi] = pick(EVENT_TYPES);
            const scale = p.value / 1000000;
            const riskMult = p.riskMult || 1.0;
            const exposure = p.isMac ? p.capexExposure : LEASE_TYPES[p.leaseTypeIdx].capexExposure;
            const grossAmt = randInt(lo, hi) * scale * riskMult;
            const landlordAmt = Math.round(grossAmt * exposure);
            if (landlordAmt >= 25) {
              s.cash -= landlordAmt;
              if (landlordAmt >= LARGE_EXPENSE) {
                alert(`🚨 Major expense — ${p.name}`, `${txt}: ${fmtFull(landlordAmt)} deducted from cash just now. (Lease structure absorbed the rest.) Check your reserves.`);
                addLog(`${txt} at ${p.name}: −${fmt(landlordAmt)}.`, "bad");
              } else {
                addLog(`${txt} at ${p.name}: −${fmt(landlordAmt)}${exposure < 1 ? " (lease passed most of it through)" : ""}.`, "bad");
              }
            }
          } else if (roll < 0.11) {
            const gain = p.value * randRange(0.0006, 0.0015);
            s.cash += gain;
            addLog(`Property-tax protest won at ${p.name}: +${fmt(gain)}.`, "good");
          }
        }

        if (s.cash < 0) {
          s.cash *= 1.01;
          if (Math.random() < 0.25) addLog("Running on the credit line — 12% APR is accruing on negative cash.", "bad");
        }
        if (s.cash + s.reserve >= 500000) unlock("warchest");
        if (s.properties.length >= 3) unlock("empire");

        s.market.forEach((d, idx) => {
          d.ttl -= 1;
          if (d.ttl <= 0) {
            if (d.hot) { addLog(`🔥 "${d.name}" (${fmt(d.price)}) got sniped by another buyer — it moved fast.`, "warn"); unlock("sniped"); }
            else addLog(`Listing "${d.name}" (${fmt(d.price)}) came off market — owner pulled it.`, "info");
            const fresh = genDeal(s.treasury + 0.0275);
            s.market[idx] = fresh;
            addLog(`${fresh.hot ? "🔥 HOT LISTING" : "New listing"}: ${fresh.name} — ${fmt(fresh.price)}, ${(fresh.cap * 100).toFixed(1)}% cap, ${LEASE_TYPES[fresh.leaseTypeIdx].code} lease.`, fresh.hot ? "warn" : "info");
          }
        });
        for (const d of s.market) d.rate = Math.max(0.03, s.treasury + 0.0275 + LEASE_TYPES[d.leaseTypeIdx].rateAdj + (DEAL_TYPES.find(t => t.name === d.name)?.typeRateAdj || 0));

        const nw = s.cash + s.reserve + (s.escrow ? s.escrow.amount : 0) + s.properties.reduce((a, p) => a + p.value - p.loan.balance, 0);
        if (!s.goalHit && nw >= GOAL) { s.goalHit = true; unlock("mogul"); addLog("🏆 $100,000,000 NET WORTH. Empire complete. (Keep playing!)", "ach"); }
      }
      s.log = [...logs.reverse(), ...s.log].slice(0, 70);
      return s;
    });
  };

  /* ---------- decisions / alerts ---------- */
  const resolveDecision = (id) => {
    setG((prev) => {
      const s = JSON.parse(JSON.stringify(prev));
      const mac = s.properties.find((p) => p.isMac);
      const logs = [];
      if (id === "kabobs-secure") { s.cash -= 15000; if (mac) mac.kabobs.secured = true; logs.push({ m: s.month, t: "Paid $15K TI — Kabobs extension locked through 2047.", k: "good" }); }
      if (id === "kabobs-pass") logs.push({ m: s.month, t: "Passed on early renewal. Expiry roll of the dice comes Jul 2037.", k: "warn" });
      s.queue.shift();
      s.log = [...logs, ...s.log].slice(0, 70);
      return s;
    });
  };
  const acknowledgeAlert = () => setG((prev) => { const s = JSON.parse(JSON.stringify(prev)); s.queue.shift(); return s; });

  const applyLump = (propId, amt) => {
    setG((prev) => {
      const s = JSON.parse(JSON.stringify(prev));
      const p = s.properties.find((x) => x.id === propId);
      if (!p || amt <= 0 || amt > s.cash || p.loan.balance <= 0) return prev;
      const applied = Math.min(amt, p.loan.balance);
      s.cash -= applied; p.loan.balance -= applied;
      const logs = [{ m: s.month, t: `Extra principal ${fmt(applied)} → ${p.name}. Balance now ${fmt(p.loan.balance)}. Payment unchanged (re-amortizes only at a reset).`, k: "good" }];
      if (!s.ach.includes("lump")) { s.ach.push("lump"); logs.push({ m: s.month, t: ACH_DEFS.lump, k: "ach" }); }
      if (p.loan.balance === 0) { logs.push({ m: s.month, t: `${p.name} is FREE & CLEAR!`, k: "good" }); if (!s.ach.includes("freeclear")) { s.ach.push("freeclear"); logs.push({ m: s.month, t: ACH_DEFS.freeclear, k: "ach" }); } }
      s.log = [...logs, ...s.log].slice(0, 70);
      return s;
    });
    setModal(null); setLumpAmt("");
  };

  const transferReserve = (dir, amt) => {
    setG((prev) => {
      const s = JSON.parse(JSON.stringify(prev));
      if (amt <= 0) return prev;
      if (dir === "in") { if (amt > s.cash) return prev; s.cash -= amt; s.reserve += amt; s.log = [{ m: s.month, t: `Stowed ${fmt(amt)} into the reserve account.`, k: "info" }, ...s.log].slice(0, 70); }
      else { if (amt > s.reserve) return prev; s.reserve -= amt; s.cash += amt; s.log = [{ m: s.month, t: `Pulled ${fmt(amt)} from reserve back to operating cash.`, k: "info" }, ...s.log].slice(0, 70); }
      if (s.cash + s.reserve >= 500000 && !s.ach.includes("warchest")) { s.ach.push("warchest"); s.log = [{ m: s.month, t: ACH_DEFS.warchest, k: "ach" }, ...s.log].slice(0, 70); }
      return s;
    });
    setResAmt("");
  };

  const sellProp = (propId, mode) => {
    setG((prev) => {
      const s = JSON.parse(JSON.stringify(prev));
      const idx = s.properties.findIndex((x) => x.id === propId);
      if (idx < 0) return prev;
      const p = s.properties[idx];
      const proceeds = p.value * 0.95 - p.loan.balance;
      const gain = Math.max(0, p.value - p.basis);
      const logs = [];
      if (mode === "cash") { const tax = 0.25 * gain; s.cash += proceeds - tax; logs.push({ m: s.month, t: `Sold ${p.name} for ${fmt(p.value)}. Net after loan, 5% costs & ${fmt(tax)} tax: +${fmt(proceeds - tax)}.`, k: "good" }); }
      else { s.escrow = { amount: (s.escrow ? s.escrow.amount : 0) + proceeds, gain: (s.escrow ? s.escrow.gain : 0) + gain, deadline: s.month + 6 }; logs.push({ m: s.month, t: `Sold ${p.name} via 1031. ${fmt(proceeds)} in exchange escrow — buy within 6 months or pay tax.`, k: "warn" }); }
      s.properties.splice(idx, 1);
      s.log = [...logs, ...s.log].slice(0, 70);
      return s;
    });
    setModal(null);
  };

  // escrowOverride: how much of the 1031 escrow the player chooses to put into this deal.
  // Can exceed the lender's minimum down payment — the surplus reduces the loan instead of sitting idle.
  const buyDeal = (dealId, escrowOverride) => {
    setG((prev) => {
      const s = JSON.parse(JSON.stringify(prev));
      const di = s.market.findIndex((d) => d.id === dealId);
      if (di < 0) return prev;
      const d = s.market[di];
      const minDown = d.price * (1 - d.ltv), closing = d.price * 0.02;
      const escrowAvail = s.escrow ? s.escrow.amount : 0;
      const escrowUsed = Math.max(0, Math.min(escrowOverride ?? Math.min(escrowAvail, minDown), escrowAvail, d.price));
      const effectiveDown = Math.max(minDown, escrowUsed);
      const loanAmt = d.price - effectiveDown;
      const fromCashForDown = Math.max(0, effectiveDown - escrowUsed);
      const fromCash = fromCashForDown + closing;
      if (fromCash > s.cash) return prev;
      const logs = [];
      s.cash -= fromCash;
      if (escrowUsed > 0) {
        s.escrow.amount -= escrowUsed;
        if (s.escrow.amount < 1000) { logs.push({ m: s.month, t: "1031 exchange completed — capital gains deferred. Basis carries forward.", k: "good" }); if (!s.ach.includes("exchange")) { s.ach.push("exchange"); logs.push({ m: s.month, t: ACH_DEFS.exchange, k: "ach" }); } s.escrow = null; }
      }
      s.properties.push({
        id: "p" + d.id, name: d.name, sub: d.sub, emoji: d.emoji, sqft: d.sqft, basis: d.price, value: d.price,
        boughtMonth: s.month, tenantName: d.tenantName, tierIdx: d.tierIdx,
        leaseMonthsLeft: d.leaseYearsLeft * 12, status: "occupied", darkUntil: null,
        leaseTypeIdx: d.leaseTypeIdx, riskMult: d.riskMult, taxAnnual: d.taxAnnual, insAnnual: d.insAnnual,
        grossRentBase: d.grossRentMo, landlordOpexBase: d.landlordOpexMo,
        loan: { balance: loanAmt, originalAmount: loanAmt, rate: d.rate, originRate: d.rate, payment: pmtCalc(loanAmt, d.rate, d.amortYears), originMonth: s.month, amortYears: d.amortYears, resets: [], floor: 0, lender: "Market Debt" },
      });
      s.market[di] = genDeal(s.treasury + 0.0275);
      const downPct = Math.round((effectiveDown / d.price) * 100);
      logs.unshift({ m: s.month, t: `Acquired ${d.name} for ${fmt(d.price)} — ${fmt(effectiveDown)} down (${downPct}%${escrowUsed > 0 ? `, ${fmt(escrowUsed)} from 1031 escrow` : ""}) + ${fmt(closing)} closing, ${(d.rate * 100).toFixed(2)}% loan on ${fmt(loanAmt)}, ${LEASE_TYPES[d.leaseTypeIdx].code} lease. Tenant: ${d.tenantName} (${CREDIT_TIERS[d.tierIdx].tier}).`, k: "good" });
      if (s.properties.length >= 3 && !s.ach.includes("empire")) { s.ach.push("empire"); logs.push({ m: s.month, t: ACH_DEFS.empire, k: "ach" }); }
      s.log = [...logs, ...s.log].slice(0, 70);
      return s;
    });
    setModal(null);
  };

  const refiRateFor = (p) => {
    const base = g.treasury + 0.0275;
    const leaseAdj = p.isMac ? 0 : LEASE_TYPES[p.leaseTypeIdx].rateAdj;
    const typeAdj = DEAL_TYPES.find((t) => t.name === p.name)?.typeRateAdj || 0;
    return Math.max(0.03, base + leaseAdj + typeAdj);
  };

  const doRefinance = (propId, newLoanAmt, newAmortYears, newRate) => {
    setG((prev) => {
      const s = JSON.parse(JSON.stringify(prev));
      const p = s.properties.find((x) => x.id === propId);
      if (!p) return prev;
      const oldBalance = p.loan.balance;
      const cashOut = newLoanAmt - oldBalance;
      const fee = newLoanAmt * 0.01;
      const netCash = cashOut - fee;
      if (netCash < 0 && Math.abs(netCash) > s.cash) return prev;
      s.cash += netCash;
      const wasFloored = p.isMac && p.loan.floor > 0;
      p.loan = {
        balance: newLoanAmt, originalAmount: newLoanAmt, rate: newRate, originRate: newRate,
        payment: pmtCalc(newLoanAmt, newRate, newAmortYears), originMonth: s.month,
        amortYears: newAmortYears, resets: [], floor: 0, lender: "Refi Lender",
      };
      const logs = [];
      let msg = `Refinanced ${p.name}: ${fmtFull(oldBalance)} balance → new ${fmtFull(newLoanAmt)} loan @ ${(newRate*100).toFixed(2)}%, ${newAmortYears}-yr am → ${fmt(p.loan.payment)}/mo. Fee ${fmtFull(fee)}.`;
      if (cashOut > 0) msg += ` Cashed out ${fmtFull(cashOut)}.`;
      if (wasFloored) msg += ` The old 6.75% rate floor is gone — this is a fresh note.`;
      logs.push({ m: s.month, t: msg, k: "good" });
      s.log = [...logs, ...s.log].slice(0, 70);
      return s;
    });
    setModal(null);
  };

  const monthlyCF = useMemo(() => {
    let cf = 0;
    for (const p of g.properties) {
      const { income, opex } = incomeOpexFor(p, g.month);
      const ds = p.loan.balance > 0 ? p.loan.payment : 0;
      cf += income - opex - ds;
    }
    return cf;
  }, [g]);

  const goalPct = Math.min(100, (netWorth / GOAL) * 100);
  const top = g.queue[0];
  const nwDisplay = useAnimatedNumber(netWorth);

  /* ============ RENDER ============ */
  return (
    <div className="board-bg" style={{ background: C.felt, minHeight: "100vh", color: C.ink, fontFamily: "'Archivo', system-ui, sans-serif", position: "relative" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Mono:wght@400;600&display=swap');
        .disp { font-family: 'Big Shoulders Display', sans-serif; letter-spacing: 0.02em; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        .stampline { background-image: repeating-linear-gradient(90deg, ${C.line} 0 8px, transparent 8px 16px); height: 2px; }
        .board-bg { background-image: radial-gradient(${C.line}55 1px, transparent 1px); background-size: 22px 22px; }
        button { cursor: pointer; transition: transform .12s ease, filter .12s ease, box-shadow .12s ease; }
        button:active { transform: scale(0.95); }
        button:hover:not(:disabled) { filter: brightness(1.08); }
        button:disabled { cursor: default; }
        button:focus-visible { outline: 2px solid ${C.brass}; outline-offset: 2px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.7); } 70% { transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes glowPulse { 0%,100% { box-shadow: 0 0 0 rgba(242,196,109,0); } 50% { box-shadow: 0 0 14px rgba(242,196,109,0.55); } }
        @keyframes shimmerMove { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
        @keyframes confettiFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(105vh) rotate(540deg); opacity: 0.9; } }
        @keyframes toastIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes countGlow { 0%,100% { text-shadow: 0 0 0 rgba(217,164,65,0); } 50% { text-shadow: 0 0 18px rgba(217,164,65,0.7); } }
        @keyframes splashIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .hot-pulse { animation: glowPulse 1.6s ease-in-out infinite; }
        .card-enter { animation: fadeInUp .45s ease both; }
        .goal-glow { animation: countGlow 1.8s ease-in-out infinite; }
        .bob { animation: bob 2.6s ease-in-out infinite; }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
      `}</style>

      {/* ===== TOASTS ===== */}
      <div style={{ position: "fixed", top: 12, right: 12, zIndex: 80, display: "flex", flexDirection: "column", gap: 8 }}>
        {toasts.map((t) => (
          <div key={t.id} className="mono" style={{
            animation: "toastIn .35s ease both", background: C.felt2, border: `1px solid ${C.gold}`, color: C.gold,
            borderRadius: 8, padding: "10px 14px", fontSize: 12, boxShadow: "0 6px 20px rgba(0,0,0,0.4)", maxWidth: 280,
          }}>
            {t.text}
          </div>
        ))}
      </div>

      {/* ===== CONFETTI ===== */}
      {confettiKey > 0 && <Confetti key={confettiKey} />}

      {/* ===== SPLASH ===== */}
      {!started && <Splash onStart={() => setStarted(true)} />}

      {/* ===== GOAL CELEBRATION ===== */}
      {showCelebration && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(6,12,9,0.88)", zIndex: 90 }} className="flex items-center justify-center p-4">
          <div style={{ animation: "popIn .5s ease both", background: C.felt2, border: `2px solid ${C.gold}`, borderRadius: 16, padding: 32, textAlign: "center", maxWidth: 420 }}>
            <div className="bob" style={{ fontSize: 56 }}>🏆</div>
            <div className="disp font-extrabold text-3xl mt-2" style={{ color: C.gold }}>YOU'RE A MOGUL</div>
            <div className="mono text-sm mt-2" style={{ color: C.ink }}>Net worth crossed $100,000,000 in {dateLabel(g.month)}.</div>

function DealCard({ d, cash, escrow, onView }) {
  const minDown = d.price * (1 - d.ltv);
  const closing = d.price * 0.02;
  const escrowAvail = escrow ? escrow.amount : 0;
  // minimum cash needed assumes escrow covers as much of the down payment as it can
  const minCashNeeded = Math.max(0, minDown - escrowAvail) + closing;
  const can = cash >= minCashNeeded;
  return (
    <div className={d.hot ? "hot-pulse" : ""} style={{ background: C.felt2, border: `1px solid ${d.hot ? C.gold : C.line}`, borderRadius: 10, padding: 12, position: "relative", transition: "transform .15s ease" }}
      onMouseEnter={(e) => (e.currentTarget.style.transform = "translateY(-2px)")}
      onMouseLeave={(e) => (e.currentTarget.style.transform = "translateY(0)")}>
      {d.hot && (
        <div className="mono bob" style={{ position: "absolute", top: -9, right: 10, background: C.gold, color: "#1A1408", fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 4 }}>
          🔥 HOT · {d.ttl}MO LEFT
        </div>
      )}
      <div className="flex items-start justify-between gap-2">
        <div className="disp font-extrabold" style={{ color: C.ink }}>{d.emoji} {d.name}</div>

      <div className="mono" style={{ fontSize: 10, color: C.inkDim }}>{d.sub} · {d.sqft.toLocaleString()} SF</div>
      <div className="mono text-sm mt-2" style={{ color: C.brass }}>{fmt(d.price)}</div>
      <div className="mono" style={{ fontSize: 11, color: C.inkDim }}>{(d.cap * 100).toFixed(1)}% cap · {fmt(d.noiMo)}/mo NOI</div>
      <div className="mono" style={{ fontSize: 11, color: C.inkDim }}>Tenant: {d.tenantName}</div>
      <div className="mono" style={{ fontSize: 11, color: C.inkDim }}>{d.leaseYearsLeft}yr lease · {Math.round(d.ltv*100)}% LTV · Min cash {fmt(minCashNeeded)}</div>
      {!d.hot && <div className="mono" style={{ fontSize: 10, color: "#6E7C6C" }}>On market ~{d.ttl}mo more</div>}
      <button onClick={onView} className="mono text-xs w-full mt-2 px-2 py-1.5" style={{ background: can ? C.brass : C.felt3, color: can ? "#1A1408" : C.inkDim, border: can ? "none" : `1px solid ${C.line}`, borderRadius: 6 }}>
        {can ? "VIEW OFFERING MEMO ▸" : "VIEW MEMO (CAN'T AFFORD YET)"}
      </button>
    </div>
  );
}

function LoanModal({ g, modal, close }) {
  const p = g.properties.find((x) => x.id === modal.propId);
  if (!p) return null;
  const L = p.loan;
  const free = L.balance <= 0;
  const { income, opex } = incomeOpexFor(p, g.month);
  const noiAnnual = (income - opex) * 12;
  const dscr = L.payment > 0 ? noiAnnual / (L.payment * 12) : Infinity;
  const ltv = p.value > 0 ? L.balance / p.value : 0;
  const paidPct = L.originalAmount ? (1 - L.balance / L.originalAmount) * 100 : 0;
  const yearsLeft = !free && L.payment > (L.balance * L.rate) / 12
    ? Math.log(L.payment / (L.payment - (L.balance * L.rate) / 12)) / Math.log(1 + L.rate / 12) / 12 : 0;
  const payoffMonth = g.month + Math.round(yearsLeft * 12);
  const elapsedYears = (g.month - L.originMonth) / 12;
  const nextReset = p.isMac ? L.resets.find((r) => r > g.month) : null;
  const dscrColor = dscr >= 1.25 ? C.sprout : dscr >= 1.10 ? C.gold : C.flare;
  return (
    <div>

function RefiModal({ g, modal, refiRateFor, doRefinance, close }) {
  const p = g.properties.find((x) => x.id === modal.propId);
  if (!p) return null;
  const [amortYears, setAmortYears] = useState(p.loan.amortYears || 25);
  const [loanInput, setLoanInput] = useState(String(Math.round(p.loan.balance)));

  const newRate = refiRateFor(p);
  const maxLoan = p.value * 0.70;
  const newLoanAmt = Math.max(0, Math.min(Number(loanInput) || 0, maxLoan));
  const oldBalance = p.loan.balance;
  const cashOut = newLoanAmt - oldBalance;
  const fee = newLoanAmt * 0.01;
  const netCash = cashOut - fee;
  const newPayment = pmtCalc(newLoanAmt, newRate, amortYears);
  const affordable = netCash >= 0 || Math.abs(netCash) <= g.cash;
  const wasFloored = p.isMac && p.loan.floor > 0;
  const rateImprovement = p.loan.rate - newRate;

  return (
    <div>
      <div className="mono text-xs" style={{ color: C.inkDim, letterSpacing: "0.08em" }}>REFINANCE</div>
      <div className="disp text-2xl font-extrabold mt-1" style={{ color: "#8FC7D9" }}>🔁 {p.name}</div>
      {wasFloored && (
        <div className="mono text-xs mt-2 px-2 py-1.5" style={{ background: C.felt3, color: C.gold, borderRadius: 4 }}>
          This loan's rate can never reset below {(p.loan.floor * 100).toFixed(2)}%. Refinancing replaces it with a fresh note — the floor goes away entirely.
        </div>
      )}

      <div className="grid grid-cols-2 gap-3 mt-3 mono text-sm">
        <div style={{ background: C.felt3, borderRadius: 8, padding: 10 }}>
          <div style={{ fontSize: 10, color: C.inkDim }}>CURRENT</div>
          <div style={{ color: C.ink }}>{(p.loan.rate * 100).toFixed(2)}% · {fmt(p.loan.payment)}/mo</div>
          <div className="mono" style={{ fontSize: 10, color: C.inkDim }}>Balance {fmtFull(oldBalance)}</div>
        </div>
        <div style={{ background: C.felt3, borderRadius: 8, padding: 10 }}>
          <div style={{ fontSize: 10, color: C.inkDim }}>TODAY'S MARKET RATE</div>
          <div style={{ color: rateImprovement > 0 ? C.sprout : C.flare }}>{(newRate * 100).toFixed(2)}%</div>
          <div className="mono" style={{ fontSize: 10, color: C.inkDim }}>{rateImprovement > 0 ? `${(rateImprovement*100).toFixed(2)}pt better` : rateImprovement < 0 ? `${(Math.abs(rateImprovement)*100).toFixed(2)}pt worse` : "unchanged"}</div>
        </div>
      </div>

      <div className="mono text-xs mt-3" style={{ color: C.inkDim }}>NEW LOAN AMOUNT · max {fmt(maxLoan)} (70% of value)</div>
      <div className="flex gap-2 mt-1 flex-wrap">
        <button onClick={() => setLoanInput(String(Math.round(oldBalance)))} className="mono text-xs px-2 py-1" style={{ background: C.felt3, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 4 }}>Same balance ({fmt(oldBalance)})</button>
        <button onClick={() => setLoanInput(String(Math.round(maxLoan)))} className="mono text-xs px-2 py-1" style={{ background: C.felt3, color: C.gold, border: `1px solid ${C.gold}`, borderRadius: 4 }}>Max cash-out ({fmt(maxLoan)})</button>
        <button onClick={() => setLoanInput("0")} className="mono text-xs px-2 py-1" style={{ background: C.felt3, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 4 }}>Pay off (0)</button>
      </div>
      <input type="number" value={loanInput} onChange={(e) => setLoanInput(e.target.value)} className="mono w-full mt-2 px-3 py-2" style={{ background: C.felt, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 6 }} />

      <div className="mono text-xs mt-3" style={{ color: C.inkDim }}>AMORTIZATION</div>
      <div className="flex gap-2 mt-1">
        {[15, 20, 25, 30].map((y) => (
          <button key={y} onClick={() => setAmortYears(y)} className="mono text-xs px-3 py-1.5"
            style={{ background: amortYears === y ? "#8FC7D9" : C.felt3, color: amortYears === y ? "#1A1408" : C.ink, border: `1px solid ${amortYears === y ? "#8FC7D9" : C.line}`, borderRadius: 4 }}>
            {y}yr
          </button>
        ))}
      </div>

      <div className="mt-3" style={{ background: C.felt, borderRadius: 8, padding: 12, border: `1px solid ${C.line}` }}>
        <div className="mono text-xs flex flex-col gap-1" style={{ color: C.ink }}>
          <div>New payment: <b>{fmt(newPayment)}/mo</b> (was {fmt(p.loan.payment)}/mo)</div>
          <div>Refi fee (1% of new loan): −{fmtFull(fee)}</div>
          {cashOut > 0
            ? <div style={{ color: C.sprout }}>Cash out at closing: +{fmtFull(cashOut)} (net of fee: {fmtFull(netCash)})</div>
            : <div style={{ color: C.inkDim }}>Cash needed to close: {fmtFull(Math.abs(netCash))}</div>}
        </div>
      </div>

      <div className="flex gap-2 mt-4">
        <button onClick={() => doRefinance(p.id, newLoanAmt, amortYears, newRate)} disabled={!affordable}
          className="disp font-extrabold px-4 py-2" style={{ background: affordable ? "#8FC7D9" : C.felt3, color: affordable ? "#1A1408" : C.inkDim, border: "none", borderRadius: 6 }}>
          CLOSE THE REFI
        </button>
        <button onClick={close} className="mono text-sm px-3 py-2" style={{ background: C.felt3, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 6 }}>Cancel</button>
      </div>
    </div>
  );
}

function LumpModal({ g, modal, lumpAmt, setLumpAmt, applyLump, close }) {
  const p = g.properties.find((x) => x.id === modal.propId);
  if (!p) return null;
  const amt = Number(lumpAmt) || 0;
  const max = Math.min(g.cash, p.loan.balance);
  const yearsLeft = p.loan.balance > 0 ? Math.log(p.loan.payment / (p.loan.payment - (p.loan.balance * p.loan.rate) / 12)) / Math.log(1 + p.loan.rate / 12) / 12 : 0;
  const newBal = Math.max(0, p.loan.balance - amt);
  const newYears = newBal > 0 && p.loan.payment > (newBal * p.loan.rate) / 12 ? Math.log(p.loan.payment / (p.loan.payment - (newBal * p.loan.rate) / 12)) / Math.log(1 + p.loan.rate / 12) / 12 : 0;
  return (
    <div>
      <div className="disp text-xl font-extrabold" style={{ color: C.brass }}>💰 Extra Principal — {p.name}</div>
      <div className="mono text-xs mt-1" style={{ color: C.inkDim }}>Balance {fmtFull(p.loan.balance)} @ {(p.loan.rate * 100).toFixed(2)}% · ~{yearsLeft.toFixed(1)} yrs left at current payment</div>
      <div className="flex gap-2 mt-3 flex-wrap">
        {[50000, 100000, 200000].map((q) => (
          <button key={q} onClick={() => setLumpAmt(String(Math.min(q, max)))} className="mono text-xs px-2 py-1" style={{ background: C.felt3, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 4 }}>{fmt(q)}</button>
        ))}
        <button onClick={() => setLumpAmt(String(Math.floor(max)))} className="mono text-xs px-2 py-1" style={{ background: C.felt3, color: C.brass, border: `1px solid ${C.brass}`, borderRadius: 4 }}>MAX {fmt(max)}</button>
      </div>
      <input type="number" value={lumpAmt} onChange={(e) => setLumpAmt(e.target.value)} placeholder="Amount" className="mono w-full mt-3 px-3 py-2" style={{ background: C.felt, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 6 }} />
      {amt > 0 && amt <= max && (
        <div className="mono text-xs mt-2" style={{ color: C.sprout }}>
          → New balance {fmtFull(newBal)}{newBal > 0 ? ` · payoff in ~${newYears.toFixed(1)} yrs (was ${yearsLeft.toFixed(1)})` : " · PAID OFF 🎉"}
          <div style={{ color: C.inkDim }}>Payment stays {fmt(p.loan.payment)}/mo until a rate reset re-amortizes.</div>
        </div>
      )}
      <div className="flex gap-2 mt-4">
        <button onClick={() => applyLump(p.id, amt)} disabled={amt <= 0 || amt > max} className="disp font-extrabold px-4 py-2" style={{ background: amt > 0 && amt <= max ? C.brass : C.felt3, color: amt > 0 && amt <= max ? "#1A1408" : C.inkDim, border: "none", borderRadius: 6 }}>APPLY</button>
        <button onClick={close} className="mono text-sm px-3 py-2" style={{ background: C.felt3, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 6 }}>Cancel</button>
      </div>
    </div>
  );
}

        <button onClick={() => transferReserve("out", amt)} disabled={amt <= 0 || amt > g.reserve} className="disp font-extrabold px-3 py-2 flex-1" style={{ background: amt > 0 && amt <= g.reserve ? C.brass : C.felt3, color: amt > 0 && amt <= g.reserve ? "#1A1408" : C.inkDim, border: "none", borderRadius: 6 }}>PULL BACK ◂</button>
      </div>

    </div>

function SellModal({ g, modal, sellProp, close }) {
  const p = g.properties.find((x) => x.id === modal.propId);
  if (!p) return null;
  const proceeds = p.value * 0.95 - p.loan.balance;
  const gain = Math.max(0, p.value - p.basis);
  const tax = 0.25 * gain;
  return (
    <div>
      <div className="disp text-xl font-extrabold" style={{ color: C.brass }}>🏷️ Sell {p.name}</div>
      <div className="mono text-xs mt-2 flex flex-col gap-1" style={{ color: C.ink }}>
        <div>Sale price (value): <b>{fmtFull(p.value)}</b></div>
        <div>Less 5% costs: −{fmtFull(p.value * 0.05)}</div>
        <div>Less loan payoff: −{fmtFull(p.loan.balance)}</div>
        <div style={{ color: C.sprout }}>Net proceeds: <b>{fmtFull(proceeds)}</b></div>
        <div style={{ color: C.inkDim }}>Taxable gain {fmtFull(gain)} → tax {fmtFull(tax)} if cashing out</div>
      </div>
      <div className="flex flex-col gap-2 mt-4">
        <button onClick={() => sellProp(p.id, "cash")} className="mono text-sm px-3 py-2 text-left" style={{ background: C.felt3, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 6 }}>💵 Cash out — receive {fmt(proceeds - tax)} after tax</button>
        <button onClick={() => sellProp(p.id, "1031")} className="mono text-sm px-3 py-2 text-left" style={{ background: C.felt3, color: C.brass, border: `1px solid ${C.brass}`, borderRadius: 6 }}>🔄 1031 Exchange — {fmt(proceeds)} to escrow, tax deferred, must buy within 6 months</button>
        <button onClick={close} className="mono text-xs px-3 py-1.5" style={{ background: "transparent", color: C.inkDim, border: "none" }}>Never mind</button>
      </div>
    </div>
  );
}

      )}

      <div className="mt-3" style={{ background: C.felt, borderRadius: 8, padding: 12, border: `1px solid ${C.line}` }}>
        <div className="mono text-xs" style={{ color: C.inkDim, marginBottom: 4 }}>PURCHASE STRUCTURE</div>
        <div className="mono text-xs flex flex-col gap-1" style={{ color: C.ink }}>
          <div>Down {downPct.toFixed(0)}% (min {Math.round((1-d.ltv)*100)}%): {fmtFull(effectiveDown)} + closing 2%: {fmtFull(closing)}</div>
          {escrowUsed > 0 && <div style={{ color: C.brass }}>From 1031 escrow: {fmtFull(escrowUsed)}</div>}
          <div>From cash: {fmtFull(fromCash)}</div>
          <div>New loan: {fmtFull(loanAmt)} @ {(d.rate * 100).toFixed(2)}%, {d.amortYears}-yr am → {fmt(pay)}/mo</div>
          <div style={{ color: C.sprout }}>Day-1 cash flow: {fmt(d.grossRentMo - d.landlordOpexMo - pay)}/mo</div>
        </div>
      </div>

      <div className="flex gap-2 mt-4">
        <button onClick={() => buyDeal(d.id, escrowUsed)} disabled={!can} className="disp font-extrabold px-4 py-2" style={{ background: can ? C.brass : C.felt3, color: can ? "#1A1408" : C.inkDim, border: "none", borderRadius: 6 }}>CLOSE THE DEAL</button>
        <button onClick={close} className="mono text-sm px-3 py-2" style={{ background: C.felt3, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 6 }}>Cancel</button>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
