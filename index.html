/* ============ SALE TAXATION (single source of truth) ============
   Commercial real estate sales are taxed in three realistic layers:

      building portion of basis; land isn't depreciable). The IRS recaptures

   3. Net Investment Income Tax (NIIT) — 3.8% on the whole gain for high earners
      (which a mogul unquestionably is).

/* ============ PERFORMANCE MATH ============
   IRR is solved properly: monthly cash flows from acquisition (equity out at
   month 0, net operating CF each month, one-off capital in/out via flowAdj),
   terminated with a hypothetical net sale TODAY (95% of value, less debt,
   less the real three-layer tax). Monthly rate found by bisection on NPV,
   then annualized. No approximations. */
const irrFromFlows = flows => {
  // flows[0] typically negative (equity in). Needs at least one sign change.
  if (!flows.length || !flows.some(f => f > 0) || !flows.some(f => f < 0)) return null;
  const npv = r => flows.reduce((a, f, i) => a + f / Math.pow(1 + r, i), 0);
  let lo = -0.95 / 12,
    hi = 2.0; // monthly bounds: −95%/yr to +2400%/yr
  let fLo = npv(lo),
    fHi = npv(hi);
  if (fLo * fHi > 0) return null; // no bracketed root
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2,
      fm = npv(mid);
    if (fLo * fm <= 0) {
      hi = mid;
      fHi = fm;
    } else {
      lo = mid;
      fLo = fm;
    }
  }
  const rm = (lo + hi) / 2;
  return Math.pow(1 + rm, 12) - 1; // annualized
};
const propPerf = (p, month) => {
  const flows = p.flows || [];
  const invested = (p.initialEquity || 0) + (p.investedExtra || 0);
  const cumCF = flows.reduce((a, f) => a + f, 0);
  const held = month - (p.trackStart != null ? p.trackStart : p.boughtMonth || 0);
  const stax = saleTax(p.basis, p.value, month - (p.boughtMonth || 0));
  const terminal = Math.max(0, p.value * 0.95 - p.loan.balance - stax.total);
  const irr = irrFromFlows([-(p.initialEquity || 0), ...flows.slice(0, -1), (flows.length ? flows[flows.length - 1] : 0) + terminal]);
  const last12 = flows.slice(-12).reduce((a, f) => a + f, 0);
  const coc = invested > 0 ? (flows.length >= 12 ? last12 : cumCF * (12 / Math.max(1, flows.length))) / invested : 0;
  const eqMult = invested > 0 ? (cumCF + terminal) / invested : 0;
  const apprec = p.value - p.basis;
  const paydown = p.debtPaid || 0;
  return {
    irr,
    coc,
    eqMult,
    invested,
    cumCF,
    terminal,
    apprec,
    paydown,
    held

};
const saleTax = (basis, value, monthsHeld) => {
  const yrs = Math.max(0, monthsHeld / 12);
  const buildingBasis = basis * TAX.buildingFrac;
  const dep = Math.min(buildingBasis, buildingBasis / TAX.deprecYears * yrs); // allowed-or-allowable
  const amountRealized = value * 0.95; // net of 5% selling costs
  const adjustedBasis = basis - dep;
  const totalGain = Math.max(0, amountRealized - adjustedBasis);
  const recaptureGain = Math.min(dep, totalGain); // §1250, capped at gain
  const ltcgGain = Math.max(0, totalGain - recaptureGain);
  const recaptureTax = recaptureGain * TAX.recapture;
  const ltcgTax = ltcgGain * TAX.ltcg;
  const niitTax = totalGain * TAX.niit;
  const total = recaptureTax + ltcgTax + niitTax;
  return {
    dep,
    totalGain,
    recaptureGain,
    ltcgGain,
    recaptureTax,
    ltcgTax,
    niitTax,
    total

};

function useAnimatedNumber(target, duration = 700) {
  const [display, setDisplay] = useState(target);
  const rafRef = useRef();
  const fromRef = useRef(target);
  useEffect(() => {
    const from = fromRef.current;
    const start = performance.now();
    cancelAnimationFrame(rafRef.current);
    const tick = now => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(from + (target - from) * eased);
      if (t < 1) rafRef.current = requestAnimationFrame(tick);else fromRef.current = target;
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [target, duration]);
  return display;
}

const EVENT_TYPES = [["Roof repair/replacement", 3500, 9000], ["HVAC service/replacement", 3000, 7000], ["Parking lot / paving", 3500, 8500], ["Storm / casualty damage", 3000, 11000], ["Structural / foundation", 4500, 13000], ["Plumbing / mechanical", 800, 2500], ["Pest control / landscaping / general upkeep", 400, 1500], ["Signage / facade repair", 600, 2200], ["Environmental / underground systems", 2500, 8000]];
let dealSeq = 0;
const genDeal = (marketRate, capShift = 0) => {
  const t = DEAL_TYPES[Math.floor(Math.random() * DEAL_TYPES.length)];
  const roundTo = t.priceRange[1] > 5000000 ? 50000 : t.priceRange[1] > 1500000 ? 25000 : 5000;
  let price = Math.round(randRange(t.priceRange[0], t.priceRange[1]) / roundTo) * roundTo;
  const tierIdx = weightedTier();
  const tier = CREDIT_TIERS[tierIdx];
  const expectedCap = 0.058 + tier.capAdj;
  const cap = Math.max(0.045, expectedCap + capShift + (Math.random() - 0.35) * 0.024);
  let hot = cap > expectedCap + capShift + 0.009;
  const noiAnnual = price * cap;
  const sqft = Math.round(randInt(t.sqftRange[0], t.sqftRange[1]) / 100) * 100;
  const leaseYearsLeft = randInt(Math.max(1, Math.floor(tier.leaseTermYears[0] / 2)), tier.leaseTermYears[1]);
  const leaseTypeIdx = weighted(t.leaseWeights);
  const lease = LEASE_TYPES[leaseTypeIdx];
  const taxRate = randRange(0.018, 0.024);
  const insRate = randRange(t.insRange[0], t.insRange[1]);
  const camRate = randRange(0.002, 0.004);
  const taxAnnual = price * taxRate;
  const insAnnual = price * insRate;
  const camAnnual = price * camRate;
  const landlordOpexAnnual = taxAnnual * (1 - lease.taxPass) + insAnnual * (1 - lease.insPass) + camAnnual * (1 - lease.camPass);
  const grossRentAnnual = noiAnnual + landlordOpexAnnual; // back-solved so marketed cap = NOI/price
  const grossRentMo = grossRentAnnual / 12;
  const landlordOpexMo = landlordOpexAnnual / 12;
  const noiMo = grossRentMo - landlordOpexMo;
  let rate = Math.max(0.03, marketRate + lease.rateAdj + t.typeRateAdj);
  let ltv = Math.min(0.75, Math.max(0.55, 0.70 + lease.ltvAdj));

  /* ---- 🔨 value-add archetype: vacant & distressed, priced at a discount to stabilized ---- */
  let valueAdd = false,
    discount = 0,
    rehabCost = 0,
    stabilizedValue = 0;
  if (Math.random() < 0.16) {
    valueAdd = true;
    hot = false;
    discount = 0.25 + Math.random() * 0.10;
    stabilizedValue = price;
    price = Math.max(50000, Math.round(price * (1 - discount) / roundTo) * roundTo);
    rehabCost = randInt(15, 30) * sqft;
    ltv = Math.max(0.45, ltv - 0.10); // lenders hate vacant
    rate += 0.010; // vacancy risk premium
  }
  return {
    id: "deal" + ++dealSeq,
    ...t,
    price,
    cap,
    noiMo,
    rate,
    sqft,
    ltv,
    tenantName: genTenantName(tierIdx),
    tierIdx,
    leaseYearsLeft,
    leaseTypeIdx,
    taxAnnual,
    insAnnual,
    camAnnual,
    landlordOpexMo,
    grossRentMo,
    hot,
    ttl: hot ? randInt(1, 3) : randInt(4, 10),
    valueAdd,
    discount,
    rehabCost,
    stabilizedValue
  };
};

function incomeOpexFor(p, m) {
  const plan = INS_PLANS[p.insurancePlan || "standard"];
  if (p.isMac) {

    return {
      income,
      opex
    };
  }
  const yrs = Math.max(0, (m - p.boughtMonth) / 12);
  const growth = Math.pow(1.03, yrs);
  const insPass = LEASE_TYPES[p.leaseTypeIdx] ? LEASE_TYPES[p.leaseTypeIdx].insPass : 0;
  const insDelta = (p.insAnnual || 0) * (1 - insPass) / 12 * growth * (plan.premMult - 1);
  if (p.status === "occupied") {
    return {

    };

// Bank underwriting: player may put MORE down than the minimum and/or pick a SHORTER
// amortization than the bank's max. Extra equity above the minimum earns a rate
// concession (2bps per extra point of down payment, capped at 30bps).
const underwrite = (d, downFrac, amortYears) => {
  const minFrac = 1 - d.ltv;
  const df = Math.min(1, Math.max(minFrac, downFrac || minFrac));
  const rate = Math.max(0.03, d.rate - Math.min(0.003, Math.max(0, df - minFrac) * 0.02));
  const amort = Math.min(amortYears || d.amortYears, d.amortYears);
  const down = d.price * df;
  const loanAmt = Math.max(0, d.price - down);
  const payment = loanAmt > 0 ? pmtCalc(loanAmt, rate, amort) : 0;
  return {
    minFrac,
    df,
    rate,
    amort,
    down,
    loanAmt,
    payment
  };
};

        if (s.properties.length >= 3) unlock("empire");
        s.market.forEach((d, idx) => {
          d.ttl -= 1;
          if (d.ttl <= 0) {
            if (d.hot) {
              addLog(`🔥 "${d.name}" (${fmt(d.price)}) got sniped by another buyer — it moved fast.`, "warn");
              unlock("sniped");
            } else addLog(`Listing "${d.name}" (${fmt(d.price)}) came off market — owner pulled it.`, "info");
            const fresh = genDeal(s.treasury + 0.0275, (REGIMES[s.regime] || REGIMES.expansion).capShift);
            s.market[idx] = fresh;
            addLog(`${fresh.hot ? "🔥 HOT LISTING" : "New listing"}: ${fresh.name} — ${fmt(fresh.price)}, ${(fresh.cap * 100).toFixed(1)}% cap, ${LEASE_TYPES[fresh.leaseTypeIdx].code} lease.`, fresh.hot ? "warn" : "info");
          }
        });
        for (const d of s.market) d.rate = Math.max(0.03, s.treasury + 0.0275 + LEASE_TYPES[d.leaseTypeIdx].rateAdj + (DEAL_TYPES.find(t => t.name === d.name)?.typeRateAdj || 0));
        const nw = s.cash + s.reserve + (s.escrow ? s.escrow.amount : 0) + s.properties.reduce((a, p) => a + p.value - p.loan.balance, 0) - (s.creditLine && s.creditLine.drawn || 0);
        if (!s.goalHit && nw >= GOAL) {
          s.goalHit = true;
          unlock("mogul");
          addLog("🏆 $100,000,000 NET WORTH. Empire complete. (Keep playing!)", "ach");
        }
      }
      s.log = [...logs.reverse(), ...s.log].slice(0, 70);
      return s;
    });
  };

  /* ---------- decisions / alerts ---------- */
  const resolveDecision = id => {
    setG(prev => {
      const s = JSON.parse(JSON.stringify(prev));
      const mac = s.properties.find(p => p.isMac);
      const logs = [];
      if (id === "kabobs-secure") {
        s.cash -= 15000;
        if (mac) mac.kabobs.secured = true;
        logs.push({
          m: s.month,
          t: "Paid $15K TI — Kabobs extension locked through 2047.",
          k: "good"
        });
      }
      if (id === "kabobs-pass") logs.push({
        m: s.month,
        t: "Passed on early renewal. Expiry roll of the dice comes Jul 2037.",
        k: "warn"
      });
      if (id && id.indexOf("cov-") === 0) {
        const q = s.queue[0];
        const p = s.properties.find(x => x.id === (q && q.propId));
        if (p && p.loan.balance > 0) {
          const {
            income,
            opex
          } = incomeOpexFor(p, s.month);
          const noiAnnual = Math.max(0, (income - opex) * 12);
          const elapsed = s.month - p.loan.originMonth;
          const remYears = Math.max(1, (p.loan.amortYears * 12 - elapsed) / 12);
          let applyPenalty = false;
          if (id === "cov-cure") {
            const targetPmt = noiAnnual / 1.25 / 12;
            const r = p.loan.rate / 12,
              n = Math.round(remYears * 12);
            const supportable = targetPmt > 0 ? targetPmt * (1 - Math.pow(1 + r, -n)) / r : 0;
            const paydown = Math.max(0, Math.ceil(p.loan.balance - supportable));
            if (paydown > 0 && paydown <= s.cash) {
              s.cash -= paydown;
              p.loan.balance -= paydown;
              p.investedExtra = (p.investedExtra || 0) + paydown;
              p.flowAdj = (p.flowAdj || 0) - paydown;
              p.debtPaid = (p.debtPaid || 0) + paydown;
              p.loan.payment = pmtCalc(p.loan.balance, p.loan.rate, remYears);
              p.covenantGraceUntil = s.month + 12;
              logs.push({
                m: s.month,
                t: `Cured the ${p.name} covenant: ${fmt(paydown)} principal paydown, payment re-amortized to ${fmt(p.loan.payment)}/mo at 1.25x coverage.`,
                k: "good"
              });
            } else {
              logs.push({
                m: s.month,
                t: `Couldn't fund the cure on ${p.name} (needed ${fmt(paydown)}) — penalty rate applies instead.`,
                k: "bad"
              });
              applyPenalty = true;
            }
          } else if (id === "cov-waiver") {
            const fee = Math.round(p.loan.balance * 0.005);
            p.flowAdj = (p.flowAdj || 0) - fee;
            if (fee <= s.cash) {
              s.cash -= fee;
              p.covenantWaivedUntil = s.month + 12;
              logs.push({
                m: s.month,
                t: `Paid ${fmt(fee)} covenant waiver on ${p.name} — 12 months of forbearance. Fix the DSCR before it expires.`,
                k: "warn"
              });
            } else {
              logs.push({
                m: s.month,
                t: `Couldn't cover the waiver fee on ${p.name} — penalty rate applies instead.`,
                k: "bad"
              });
              applyPenalty = true;
            }
          }
          if (id === "cov-penalty" || applyPenalty) {
            p.loan.rate = Math.min(0.18, p.loan.rate + 0.015);
            p.loan.payment = pmtCalc(p.loan.balance, p.loan.rate, remYears);
            p.covenantGraceUntil = s.month + 12;
            logs.push({
              m: s.month,
              t: `${p.loan.lender} imposed a +1.50% penalty rate on ${p.name} — now ${(p.loan.rate * 100).toFixed(2)}%, ${fmt(p.loan.payment)}/mo. Refinancing out of this loan clears it.`,
              k: "bad"
            });
          }
        }
      }
      s.queue.shift();
      s.log = [...logs, ...s.log].slice(0, 70);
      return s;
    });
  };
  const acknowledgeAlert = () => setG(prev => {
    const s = JSON.parse(JSON.stringify(prev));

    return s;
  });
  const applyLump = (propId, amt) => {
    setG(prev => {

      if (!p || amt <= 0 || amt > s.cash || p.loan.balance <= 0) return prev;
      const applied = Math.min(amt, p.loan.balance);
      s.cash -= applied;
      p.loan.balance -= applied;
      p.investedExtra = (p.investedExtra || 0) + applied;
      p.flowAdj = (p.flowAdj || 0) - applied;
      p.debtPaid = (p.debtPaid || 0) + applied;

        m: s.month,

  const transferReserve = (dir, amt) => {
    setG(prev => {

  const hireManager = candId => {

  const fireManager = mgId => {

  const toggleAssign = (mgId, propId) => {
    setG(prev => {

        mg.props = mg.props.filter(x => x !== propId);
        if (!mg.props.length) mg.city = null;
      } else {
        if (mg.props.length >= MGR_CAP) return prev;

        if (mg.city && mg.city !== c) return prev; // one city per manager
        mg.city = c;

      }

    });
  };
  const sellProp = (propId, mode) => {
    setG(prev => {
      const s = JSON.parse(JSON.stringify(prev));
      const idx = s.properties.findIndex(x => x.id === propId);
      if (idx < 0) return prev;
      const p = s.properties[idx];
      const proceeds = p.value * 0.95 - p.loan.balance;
      const held = s.month - (p.boughtMonth || 0);
      const stax = saleTax(p.basis, p.value, held);
      const logs = [];
      if (mode === "cash") {
        s.cash += proceeds - stax.total;
        logs.push({
          m: s.month,
          t: `Sold ${p.name} for ${fmt(p.value)}. Tax: ${fmt(stax.recaptureTax)} recapture + ${fmt(stax.ltcgTax)} LTCG + ${fmt(stax.niitTax)} NIIT = ${fmt(stax.total)}. Net: +${fmt(proceeds - stax.total)}.`,
          k: "good"
        });
      } else {
        s.escrow = {
          amount: (s.escrow ? s.escrow.amount : 0) + proceeds,
          gain: (s.escrow ? s.escrow.gain : 0) + stax.totalGain,
          taxDeferred: (s.escrow && s.escrow.taxDeferred ? s.escrow.taxDeferred : 0) + stax.total,
          deadline: s.month + 6
        };
        logs.push({
          m: s.month,
          t: `Sold ${p.name} via 1031. ${fmt(proceeds)} to escrow — ${fmt(stax.total)} of tax deferred. Buy within 6 months or it comes due.`,
          k: "warn"
        });
      }
      s.properties.splice(idx, 1);
      (s.managers || []).forEach(mg => {
        mg.props = mg.props.filter(x => x !== propId);
        if (!mg.props.length) mg.city = null;

  };

  // escrowOverride: how much of the 1031 escrow the player chooses to put into this deal.
  // Can exceed the lender's minimum down payment — the surplus reduces the loan instead of sitting idle.
  const buyDeal = (dealId, escrowOverride, downFrac, amortChoice) => {
    setG(prev => {
      const s = JSON.parse(JSON.stringify(prev));
      const di = s.market.findIndex(d => d.id === dealId);
      if (di < 0) return prev;
      const d = s.market[di];
      const minDown = d.price * (1 - d.ltv),
        closing = d.price * 0.02;
      const escrowAvail = s.escrow ? s.escrow.amount : 0;
      const escrowUsed = Math.max(0, Math.min(escrowOverride ?? Math.min(escrowAvail, minDown), escrowAvail, d.price));
      // player-chosen down payment, but escrow already committed can push it higher, never lower than bank minimum
      const chosenDown = Math.max(d.price * (downFrac || 1 - d.ltv), escrowUsed);
      const uw = underwrite(d, chosenDown / d.price, amortChoice);
      const effectiveDown = uw.down;
      const loanAmt = uw.loanAmt;
      const fromCashForDown = Math.max(0, effectiveDown - escrowUsed);
      const fromCash = fromCashForDown + closing;
      if (fromCash > s.cash) return prev;
      const logs = [];
      s.cash -= fromCash;
      if (escrowUsed > 0) {
        s.escrow.amount -= escrowUsed;
        if (s.escrow.amount < 1000) {
          logs.push({
            m: s.month,
            t: "1031 exchange completed — capital gains deferred. Basis carries forward.",
            k: "good"
          });
          if (!s.ach.includes("exchange")) {
            s.ach.push("exchange");
            logs.push({
              m: s.month,
              t: ACH_DEFS.exchange,
              k: "ach"
            });
          }
          s.escrow = null;
        }
      }
      s.properties.push({
        id: "p" + d.id,
        name: d.name,
        sub: d.sub,
        emoji: d.emoji,
        sqft: d.sqft,
        basis: d.price,
        value: d.price,
        initialEquity: effectiveDown + closing,
        investedExtra: 0,
        flows: [],
        trackStart: s.month,
        debtPaid: 0,
        flowAdj: 0,
        boughtMonth: s.month,
        tenantName: d.tenantName,
        tierIdx: d.tierIdx,
        leaseMonthsLeft: d.leaseYearsLeft * 12,
        status: d.valueAdd ? "dark" : "occupied",
        darkUntil: null,
        needsRehab: !!d.valueAdd,
        rehabCost: d.rehabCost || 0,
        stabilizedValue: d.stabilizedValue || 0,
        stabilizeOnLease: false,
        insurancePlan: "standard",
        valueHistory: [d.price],
        secured: false,
        renewCooldownUntil: 0,
        leaseTypeIdx: d.leaseTypeIdx,
        riskMult: d.riskMult,
        taxAnnual: d.taxAnnual,
        insAnnual: d.insAnnual,
        grossRentBase: d.grossRentMo,
        landlordOpexBase: d.landlordOpexMo,
        loan: {
          balance: loanAmt,
          originalAmount: loanAmt,
          rate: uw.rate,
          originRate: uw.rate,
          payment: uw.payment,
          originMonth: s.month,
          amortYears: uw.amort,
          resets: [],
          floor: 0,
          lender: "Market Debt"
        }
      });
      s.market[di] = genDeal(s.treasury + 0.0275, (REGIMES[s.regime] || REGIMES.expansion).capShift);
      const downPct = Math.round(effectiveDown / d.price * 100);
      logs.unshift({
        m: s.month,
        t: `Acquired ${d.name} for ${fmt(d.price)} — ${fmt(effectiveDown)} down (${downPct}%${escrowUsed > 0 ? `, ${fmt(escrowUsed)} from 1031 escrow` : ""}) + ${fmt(closing)} closing${loanAmt > 0 ? `, ${(uw.rate * 100).toFixed(2)}% loan on ${fmt(loanAmt)}, ${uw.amort}-yr am` : ", ALL CASH"}, ${LEASE_TYPES[d.leaseTypeIdx].code} lease. Tenant: ${d.tenantName} (${CREDIT_TIERS[d.tierIdx].tier}).`,
        k: "good"
      });
      if (s.properties.length >= 3 && !s.ach.includes("empire")) {
        s.ach.push("empire");
        logs.push({
          m: s.month,
          t: ACH_DEFS.empire,
          k: "ach"
        });
      }
      s.log = [...logs, ...s.log].slice(0, 70);
      return s;
    });
    setModal(null);
  };
  const refiRateFor = p => {
    const base = g.treasury + 0.0275;
    const leaseAdj = p.isMac ? 0 : LEASE_TYPES[p.leaseTypeIdx].rateAdj;
    const typeAdj = DEAL_TYPES.find(t => t.name === p.name)?.typeRateAdj || 0;
    return Math.max(0.03, base + leaseAdj + typeAdj);
  };
  const doRefinance = (propId, newLoanAmt, newAmortYears, newRate) => {
    setG(prev => {
      const s = JSON.parse(JSON.stringify(prev));
      const p = s.properties.find(x => x.id === propId);

      const cashOut = newLoanAmt - oldBalance;
      const fee = newLoanAmt * 0.01;
      const netCash = cashOut - fee;

      s.cash += netCash;

      p.loan = {
        balance: newLoanAmt,
        originalAmount: newLoanAmt,
        rate: newRate,
        originRate: newRate,

        amortYears: newAmortYears,
        resets: [],
        floor: 0,
        lender: "Refi Lender"
      };

  // 🤝 Early lease extension: costs ~3 months gross rent (TI/commissions).

  // 🔨 Fund the rehab on a value-add buy: pay the budget, broker markets it, lease-up in 3-6 months
  const fundRehab = propId => {

  // 🛡 Cycle insurance deductible: Standard → Low-ded (pricier premium, smaller repair bills) → High-ded (cheap premium, bigger repair bills)
  const changeInsurance = propId => {
    setG(prev => {
      const s = JSON.parse(JSON.stringify(prev));

  const clCapacity = useMemo(() => 0.6 * g.properties.filter(p => p.loan.balance <= 0).reduce((a, p) => a + p.value, 0), [g]);

  // 🏛️ Portfolio credit line: free & clear properties collateralize a floating-rate,
  // interest-only facility at 60% of value. Draw for acquisitions; repay anytime.
  const creditLineOp = (dir, amt) => {
    setG(prev => {
      const s = JSON.parse(JSON.stringify(prev));
      s.creditLine = s.creditLine || {
        drawn: 0
      };
      if (amt <= 0) return prev;
      const cap = 0.6 * s.properties.filter(p => p.loan.balance <= 0).reduce((a, p) => a + p.value, 0);
      const logs = [];
      if (dir === "draw") {
        const take = Math.min(amt, Math.max(0, cap - s.creditLine.drawn));
        if (take <= 0) return prev;
        s.creditLine.drawn += take;
        s.cash += take;
        logs.push({
          m: s.month,
          t: `Drew ${fmt(take)} on the portfolio credit line (${fmt(s.creditLine.drawn)} of ${fmt(cap)} capacity). Interest-only at ${((s.treasury + 0.035) * 100).toFixed(2)}%, floating.`,
          k: "warn"
        });
        if (!s.ach.includes("heloc")) {
          s.ach.push("heloc");
